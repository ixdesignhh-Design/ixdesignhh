<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>IX Design Hamburg | Cyber Hub</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&family=JetBrains+Mono:wght@400&family=Syncopate:wght@700&display=swap" rel="stylesheet">

  <style>
    :root {
      --p: #00f2ff; 
      --s: #ff00c8; 
      --bg: #030408;
      --glass: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.1);
      --font-main: 'Plus Jakarta Sans', sans-serif;
      --font-brand: 'Syncopate', sans-serif;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body, html {
      margin: 0; padding: 0; background: var(--bg);
      color: #fff; font-family: var(--font-main);
      overflow-x: hidden; min-height: 100vh;
    }

    /* --- DYNAMIC ROBOT QR INTRO --- */
    #intro-robot {
      position: fixed; inset: 0; background: #000; z-index: 10000;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.8s cubic-bezier(0.9, 0, 0.1, 1);
    }
    .robot {
      position: relative; width: 220px; height: 300px;
      display: flex; flex-direction: column; align-items: center;
      perspective: 1200px;
    }
    .robot-head {
      width: 130px; height: 90px; background: #1a1a1a; border: 3px solid var(--p);
      border-radius: 20px; position: relative; margin-bottom: 15px;
      box-shadow: 0 0 30px rgba(0,242,255,0.4); animation: robotFloat 3s infinite ease-in-out;
    }
    .eyes { display: flex; gap: 20px; justify-content: center; margin-top: 30px; }
    .eye { width: 18px; height: 18px; background: var(--p); border-radius: 50%; box-shadow: 0 0 15px var(--p); animation: blink 4s infinite; }
    
    .robot-body {
      width: 180px; height: 150px; background: #1a1a1a; border: 3px solid var(--p);
      border-radius: 30px; position: relative; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 30px rgba(0,242,255,0.2);
    }
    .qr-container { position: relative; width: 100px; height: 100px; transform-style: preserve-3d; }
    .qr-ring {
      position: absolute; inset: -15px; border: 2px solid var(--s); border-radius: 50%;
      border-top-color: transparent; animation: rotateRing 1.5s infinite linear;
    }
    .qr-screen {
      width: 100%; height: 100%; background: #fff; padding: 10px; border-radius: 10px;
      animation: qrPulse 1.5s infinite alternate;
    }
    .qr-screen svg { width: 100%; height: 100%; fill: #000; }
    .scanner-line {
      position: absolute; width: 100%; height: 3px; background: var(--p);
      top: 50%; left: 0; box-shadow: 0 0 20px var(--p); animation: scanMove 2s infinite ease-in-out;
    }

    @keyframes rotateRing { to { transform: rotate(360deg); } }
    @keyframes robotFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    @keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0); } }
    @keyframes qrPulse { from { transform: scale(0.9); } to { transform: scale(1.1); } }
    @keyframes scanMove { 0% { top: 10%; } 100% { top: 90%; } }

    .robot-open #intro-robot { opacity: 0; visibility: hidden; transform: scale(1.5); filter: blur(20px); }

    /* --- LAYOUT --- */
    .bg-web { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 0%, #12172b 0%, #030408 100%); }
    
    .lang-switcher { position: fixed; top: 20px; right: 20px; z-index: 5000; display: flex; gap: 10px; }
    .lang-btn { background: var(--glass); border: 1px solid var(--glass-border); color: #fff; padding: 10px 14px; border-radius: 12px; cursor: pointer; font-size: 11px; font-weight: 800; backdrop-filter: blur(10px); }
    .lang-btn.active { background: var(--p); color: #000; border-color: var(--p); box-shadow: 0 0 15px var(--p); }

    .app-container { max-width: 600px; margin: 0 auto; padding: 0 0 60px 0; opacity: 0; transform: translateY(30px); transition: 1.2s cubic-bezier(0.2, 0.8, 0.2, 1); }
    .loaded .app-container { opacity: 1; transform: translateY(0); }

    /* BANNER */
    .full-banner { width: 100%; margin: 0; border-bottom: 1px solid var(--glass-border); background: #000; }
    .full-banner img { width: 100%; height: auto; display: block; }

    header { text-align: center; padding: 20px 20px 0; }
    h1 { font-family: var(--font-brand); font-size: 22px; margin: 15px 0; letter-spacing: 2px; background: linear-gradient(to right, #fff, var(--p)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    /* SOCIAL BAR - BIGGER ICONS */
    .social-bar { display: flex; justify-content: center; gap: 20px; margin: 30px 0; }
    .social-icon {
      width: 62px; height: 62px; border-radius: 18px;
      background: var(--glass); border: 1px solid var(--glass-border);
      display: flex; align-items: center; justify-content: center; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .social-icon svg { width: 30px; height: 30px; fill: white; }
    .social-icon:hover { background: var(--p); border-color: var(--p); transform: translateY(-6px) rotate(5deg); box-shadow: 0 10px 25px rgba(0,242,255,0.4); }
    .social-icon:hover svg { fill: black; }

    /* CONTACT SECTION */
    .contact-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 20px; margin-bottom: 40px; }
    .contact-card {
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: 20px; padding: 15px 10px; text-align: center;
      text-decoration: none; color: #fff; transition: 0.3s;
    }
    .contact-card i { font-size: 20px; color: var(--p); display: block; margin-bottom: 8px; }
    .contact-card span { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--p); }
    .contact-card div { font-size: 11px; margin-top: 5px; opacity: 0.7; word-break: break-all; }
    .contact-card:hover { background: rgba(0, 242, 255, 0.1); border-color: var(--p); transform: scale(1.05); }

    /* SERVICES */
    .section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 4px; color: var(--p); margin: 0 20px 15px; display: block; font-family: 'JetBrains Mono'; }
    .services-list { display: flex; flex-direction: column; gap: 12px; padding: 0 20px; }
    .service-item { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 24px; overflow: hidden; transition: 0.4s ease; }
    .service-header { padding: 24px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
    .service-header h3 { font-size: 16px; margin: 0; font-weight: 800; }
    .service-header .arrow { color: var(--p); transition: 0.4s; font-family: monospace; }
    .service-content { max-height: 0; overflow: hidden; transition: all 0.5s ease; padding: 0 24px; }
    .service-item.active { border-color: var(--p); background: rgba(255,255,255,0.08); }
    .service-item.active .arrow { transform: rotate(180deg); color: var(--s); }
    .service-item.active .service-content { max-height: 1200px; padding-bottom: 30px; }
    .service-desc { font-size: 14px; line-height: 1.6; color: #ccc; margin-bottom: 20px; }
    .service-gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .gallery-img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 15px; border: 1px solid var(--glass-border); cursor: pointer; }

    #lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 20000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
    #lightbox img { max-width: 90%; max-height: 80vh; border-radius: 12px; border: 1px solid var(--p); }

    footer { text-align: center; margin-top: 50px; font-size: 9px; opacity: 0.3; font-family: 'JetBrains Mono'; padding-bottom: 40px; }
  </style>
</head>

  <div id="lightbox" onclick="this.style.display='none'"><img src="" id="lb-img"></div>

  <script>
    const CONFIG = {
      de: {
        sec: "UNSERE LEISTUNGEN",
        contactLabels: ["Rufen", "E-Mail", "WhatsApp"],
        services: {
          laser: { t: "Laser & CNC", d: "Schneiden und Gravieren von Holz, Acryl i Kunststoffen. Schilder, Dekorationen, Personalisierung." },
          druk3d: { t: "3D-Druck", d: "Prototypen, Gehäuse, technische Elemente und kurze Produktionsserien." },
          projekt: { t: "Design", d: "3D-Modelle, Produktionsdateien (SVG, STL), Visualisierungen und Produktentwicklung." },
          reklama: { t: "Werbung & Personalisierung", d: "Visitenkarten, Gadgets, Branding und individuelle Umsetzungen." },
          odziez: { t: "Druck & Stickerei", d: "Sublimation, Thermotransfer und Computerstickerei auf Kleidung und Textilien." },
          led: { t: "Dekorationen & LED", d: "Moderne Innenelemente, beleuchtete Schriftzüge, Premium-Projekte." },
          box: { t: "Premium-Verpackungen", d: "Exklusive Schachteln und Sammlerkonstruktionen." },
          custom: { t: "Individuelle Projekte", d: "Von der Idee bis zum fertigen Produkt – ohne Einschränkungen." }
        }
      },
      pl: {
        sec: "NASZE USŁUGI",
        contactLabels: ["Zadzwoń", "E-mail", "WhatsApp"],
        services: {
          laser: { t: "Laser & CNC", d: "Cięcie i grawerowanie drewna, akrylu i tworzyw. Szyldy, dekoracje, personalizacja." },
          druk3d: { t: "Druk 3D", d: "Prototypy, obudowy, elementy techniczne i krótkie serie produkcyjne." },
          projekt: { t: "Projektowanie", d: "Modele 3D, pliki do produkcji (SVG, STL), wizualizacje i rozwój produktów." },
          reklama: { t: "Reklama & personalizacja", d: "Wizytówki, gadżety, branding i indywidualne realizacje." },
          odziez: { t: "Nadruki & haft", d: "Sublimacja, termotransfer i haft komputerowy na odzieży i tekstyliach." },
          led: { t: "Dekoracje & LED", d: "Nowoczesne elementy wnętrz, podświetlane napisy, projekty premium." },
          box: { t: "Opakowania premium", d: "Ekskluzywne pudełka i konstrukcje kolekcjonerskie." },
          custom: { t: "Projekty indywidualne", d: "Od pomysłu do gotowego produktu — bez ograniczeń." }
        }
      },
      en: {
        sec: "OUR SERVICES",
        contactLabels: ["Call", "Email", "WhatsApp"],
        services: {
          laser: { t: "Laser & CNC", d: "Cutting and engraving of wood, acrylic, and plastics. Signs, decorations, personalization." },
          druk3d: { t: "3D Printing", d: "Prototypes, housings, technical elements, and short production runs." },
          projekt: { t: "Design", d: "3D models, production files (SVG, STL), visualizations, and product development." },
          reklama: { t: "Advertising & Branding", d: "Business cards, gadgets, branding, and individual realizations." },
          odziez: { t: "Prints & Embroidery", d: "Sublimation, heat transfer, and computer embroidery on clothing and textiles." },
          led: { t: "Decorations & LED", d: "Modern interior elements, illuminated signs, and premium projects." },
          box: { t: "Premium Packaging", d: "Exclusive boxes and collector constructions." },
          custom: { t: "Individual Projects", d: "From idea to finished product – without limits." }
        }
      }
    };

    let currentLang = 'de';

    function setLang(lang) {
      currentLang = lang;
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.id === `btn-${lang}`));
      render();
    }

    function render() {
      const data = CONFIG[currentLang];
      document.getElementById('sec-title').innerText = data.sec;
      
      // Update contact labels
      const contactSpans = document.querySelectorAll('.contact-card span');
      contactSpans[0].innerText = "📞 " + data.contactLabels[0];
      contactSpans[1].innerText = "📧 " + data.contactLabels[1];
      contactSpans[2].innerText = "🟢 " + data.contactLabels[2];

      const list = document.getElementById('services-list');
      list.innerHTML = '';
      Object.keys(data.services).forEach(key => {
        const s = data.services[key];
        const item = document.createElement('div');
        item.className = 'service-item';
        item.innerHTML = `
          <div class="service-header" onclick="toggle(this)">
            <h3>${s.t}</h3>
            <span class="arrow">▼</span>
          </div>
          <div class="service-content">
            <p class="service-desc">${s.d}</p>
            <div class="service-gallery">
              <img src="img/${key}_1.jpg" class="gallery-img" onclick="pop(this.src)" onerror="this.style.display='none'">
              <img src="img/${key}_2.jpg" class="gallery-img" onclick="pop(this.src)" onerror="this.style.display='none'">
              <img src="img/${key}_3.jpg" class="gallery-img" onclick="pop(this.src)" onerror="this.style.display='none'">
              <img src="img/${key}_4.jpg" class="gallery-img" onclick="pop(this.src)" onerror="this.style.display='none'">
            </div>
          </div>
        `;
        list.appendChild(item);
      });
    }

    function toggle(el) {
      const parent = el.parentElement;
      const active = parent.classList.contains('active');
      document.querySelectorAll('.service-item').forEach(i => i.classList.remove('active'));
      if(!active) parent.classList.add('active');
    }

    function pop(src) {
      document.getElementById('lb-img').src = src;
      document.getElementById('lightbox').style.display = 'flex';
    }

    function startSite() {
        document.body.classList.add('robot-open');
        setTimeout(() => {
          document.body.classList.add('loaded');
          render();
        }, 800);
    }

    window.addEventListener('load', startSite);
    setTimeout(startSite, 4000); // Failsafe
  </script>
</body>
